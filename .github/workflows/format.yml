name: Format codebase

on:
  push:
    branches: main
  pull_request:

jobs:
  ruff:
    runs-on: ubuntu-latest
    name: Check Python formatting
    steps:
    - uses: actions/checkout@v4

    - uses: astral-sh/ruff-action@v1
      with:
        args: "format --check"
        # changed-files: 'true'
