{% extends "htmx/base.html" %}
{% load django_htmx %}

{% block main %}
    <section>
        <p>
            Latest: {{ latest }}
        </p>
    </section>

    <section>
        <table id="table">
            {% block table %}{% endblock %}
        </table>
    </section>

    <section>
        <p>
            Total, all time: {{ qs|length }}
        </p>
    </section>
{% endblock %}
